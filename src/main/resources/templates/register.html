<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ro'yxatdan o'tish | Bilim Ulash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#EEF2FF] min-h-screen flex items-center justify-center p-6">
<div class="bg-white w-full max-w-md rounded-[3rem] shadow-2xl p-12 border border-slate-50">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter uppercase italic">RO'YXATDAN <span class="text-indigo-600">O'TISH</span></h1>
    </div>

    <form th:action="@{/auth/register}" th:object="${userCreateDto}" method="post" class="space-y-6">
        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">To'liq ism</label>
            <input type="text" th:field="*{fullName}" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] focus:border-indigo-500 outline-none font-bold" placeholder="F.I.SH" required>
            <p class="text-rose-500 text-[10px] font-bold ml-4" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
        </div>

        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Telefon raqam</label>
            <input type="text" th:field="*{phoneNumber}" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] focus:border-indigo-500 outline-none font-bold" placeholder="+998" required>
            <p class="text-rose-500 text-[10px] font-bold ml-4" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
        </div>

        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Parol</label>
            <input type="password" th:field="*{password}" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] focus:border-indigo-500 outline-none font-bold" placeholder="******" required>
            <p class="text-rose-500 text-[10px] font-bold ml-4" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>

        <button type="submit" class="w-full bg-indigo-600 hover:bg-slate-800 text-white font-black py-6 rounded-[1.5rem] shadow-xl transition transform active:scale-95 uppercase tracking-widest text-xs">
            Ro'yxatdan o'tish
        </button>
    </form>
    <div class="mt-8 text-center">
        <a th:href="@{/login}" class="text-indigo-600 font-black text-xs uppercase tracking-widest hover:underline">Kirish sahifasiga qaytish</a>
    </div>
</div>
</body>
</html>
