<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Tahrirlash | Bilim Ulash</title></head>
<body>
<div layout:fragment="content" class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-black text-slate-800 mb-6 uppercase italic">Profilni <span class="text-indigo-600">tahrirlash</span></h1>
    <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
        <form th:action="@{/view/users/update/{id}(id=${userUpdateDto.id})}"
              th:object="${userUpdateDto}" method="post" class="space-y-6">

            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">To'liq ism</label>
                <input type="text" th:field="*{fullName}"
                       class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 outline-none font-bold" required>
                <p class="text-rose-500 text-xs font-bold" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Telefon raqam</label>
                <input type="text" th:field="*{phoneNumber}"
                       class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 outline-none font-bold" required>
                <p class="text-rose-500 text-xs font-bold" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-slate-800 transition uppercase text-xs tracking-widest">
                    Saqlash
                </button>
                <a th:href="@{/home}" class="px-8 bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl hover:bg-slate-200 transition text-xs uppercase">
                    Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
