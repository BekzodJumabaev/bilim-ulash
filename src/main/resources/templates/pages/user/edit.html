<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Profilni tahrirlash | Bilim Ulash</title>
</head>
<body>
<div layout:fragment="content" class="container mx-auto px-4 py-8">

    <div class="max-w-2xl mx-auto mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Profil ma'lumotlarini tahrirlash</h1>
        <p class="text-gray-600">Ma'lumotlaringizni yangilang va saqlash tugmasini bosing.</p>
    </div>

    <div class="max-w-2xl mx-auto bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
        <form th:action="@{/view/users/update-profile/{id}(id=${user.id})}"
              th:method="post"
              th:object="${user}"
              class="p-6 space-y-6">

            <div th:if="${#fields.hasErrors('*')}" class="bg-red-50 border-l-4 border-red-500 p-4 mb-4">
                <p class="text-red-700 text-sm">Iltimos, shakldagi xatoliklarni tuzating.</p>
            </div>

            <div>
                <label for="fullName" class="block text-sm font-semibold text-gray-700 mb-1">To'liq ism-sharifingiz</label>
                <input type="text"
                       id="fullName"
                       th:field="*{fullName}"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                       th:classappend="${#fields.hasErrors('fullName')} ? 'border-red-500' : 'border-gray-300'"
                       placeholder="Masalan: Bekzod Jumabaev">
                <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="mt-1 text-sm text-red-600"></p>
            </div>

            <div>
                <label for="phoneNumber" class="block text-sm font-semibold text-gray-700 mb-1">Telefon raqamingiz</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <i class="fas fa-phone"></i>
                    </span>
                    <input type="text"
                           id="phoneNumber"
                           th:field="*{phoneNumber}"
                           class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all border-gray-300"
                           placeholder="+998901234567">
                </div>
                <p th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="mt-1 text-sm text-red-600"></p>
                <p class="mt-1 text-xs text-gray-500">Bu raqam tizimga kirish uchun login hisoblanadi.</p>
            </div>

            <div class="flex items-center justify-end space-x-4 pt-4 border-t border-gray-100">
                <a th:href="@{/view/users/profile/{id}(id=${user.id})}"
                   class="px-6 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                    Bekor qilish
                </a>
                <button type="submit"
                        class="px-6 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 transition-all shadow-lg">
                    O'zgarishlarni saqlash
                </button>
            </div>

        </form>
    </div>
</div>
</body>
</html>
