<!DOCTYPE html>
<html layout:decorate="~{layout/main}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Bilim Egalari | Bilim Ulash</title></head>
<body>
<div layout:fragment="content" class="space-y-10">
    <div class="flex flex-col md:flex-row justify-between items-center gap-6 bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter uppercase italic">Bilim Egalari</h1>
            <p class="text-slate-400 font-medium text-sm mt-1">O'zingizga kerakli mahorat egasini toping va bilim ulashing</p>
        </div>

        <form th:action="@{/home}" method="get" class="flex w-full md:w-auto bg-slate-50 rounded-2xl p-1.5 border-2 border-slate-100 focus-within:border-indigo-500 transition-all shadow-inner">
            <div class="flex items-center pl-4 text-slate-400">
                <i class="fas fa-search"></i>
            </div>
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Ism yoki mahorat..."
                   class="bg-transparent p-3 outline-none w-full md:w-64 font-semibold text-slate-700">
            <button type="submit" class="bg-indigo-600 text-white px-8 rounded-xl font-black hover:bg-indigo-700 transition shadow-lg shadow-indigo-200 uppercase tracking-widest text-xs">
                Qidirish
            </button>
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div th:each="user : ${users.content}"
             class="group bg-white rounded-[2.5rem] shadow-lg hover:shadow-2xl transition-all duration-500 p-8 border border-slate-50 flex flex-col justify-between relative overflow-hidden">

            <div class="absolute -right-4 -top-4 w-24 h-24 bg-indigo-50 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>

            <div class="relative z-10">
                <div class="flex items-center space-x-5 mb-6">
                    <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-xl shadow-indigo-100 group-hover:scale-110 transition-transform"
                         th:text="${#strings.substring(user.fullName,0,1)}">U</div>
                    <div>
                        <h2 class="text-xl font-black text-slate-800 tracking-tight" th:text="${user.fullName}">F.I.SH</h2>
                        <span class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em]" th:text="${user.phoneNumber}">Telefon</span>
                    </div>
                </div>

                <div class="flex flex-wrap gap-2 mb-8">
                    <span th:each="sk : ${user.skills}"
                          class="px-4 py-1.5 bg-slate-50 text-slate-600 rounded-xl text-[10px] font-black uppercase tracking-widest border border-slate-100 group-hover:bg-indigo-50 group-hover:text-indigo-600 group-hover:border-indigo-100 transition-colors"
                          th:text="${sk.skillName}">Mahorat</span>
                    <span th:if="${#lists.isEmpty(user.skills)}" class="text-slate-300 text-xs italic">Mahoratlar yo'q</span>
                </div>
            </div>

            <div class="flex justify-between items-center pt-6 border-t border-slate-50 relative z-10">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Balans</span>
                    <span class="text-xl font-black text-emerald-600 tracking-tighter">
                        <i class="fas fa-clock mr-1 opacity-50"></i> <span th:text="${user.timeBalans}">0</span> min
                    </span>
                </div>
                <a th:href="@{/view/transfer}"
                   class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black text-xs hover:bg-slate-800 shadow-lg shadow-indigo-100 transition transform active:scale-95 uppercase tracking-widest">
                    Vaqt berish
                </a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(users.content)}" class="py-20 text-center bg-white rounded-[3rem] shadow-inner border-2 border-dashed border-slate-100">
        <div class="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-users-slash text-slate-300 text-3xl"></i>
        </div>
        <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Foydalanuvchilar topilmadi</p>
    </div>
</div>
</body>
</html>
