<!DOCTYPE html>
<html layout:decorate="~{layout/main}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-black text-gray-800 tracking-tight">BILIM EGALARI</h1>
        <form th:action="@{/home}" method="get" class="flex bg-white rounded-2xl shadow-md p-1 border">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Ism yoki bilim..." class="p-3 outline-none rounded-l-2xl w-64">
            <button type="submit" class="bg-indigo-600 text-white px-6 rounded-xl font-bold hover:bg-indigo-700 transition">Qidirish</button>
        </form>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="user : ${users.content}" class="bg-white rounded-[2rem] shadow-lg hover:shadow-2xl transition p-6 border border-gray-100 flex flex-col justify-between">
            <div>
                <div class="flex items-center space-x-4 mb-4">
                    <div class="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600 text-2xl font-bold" th:text="${#strings.substring(user.fullName,0,1)}"></div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-800" th:text="${user.fullName}"></h2>
                        <span class="text-xs font-bold text-indigo-500 uppercase tracking-widest" th:text="${user.phoneNumber}"></span>
                    </div>
                </div>
                <div class="flex flex-wrap gap-2 mb-4">
                    <span th:each="sk : ${user.skills}" class="px-3 py-1 bg-slate-100 text-slate-700 rounded-full text-xs font-bold border" th:text="${sk.skillName}"></span>
                </div>
            </div>
            <div class="flex justify-between items-center pt-4 border-t">
                <span class="text-lg font-black text-emerald-600"><i class="fas fa-clock mr-1"></i> <span th:text="${user.timeBalans}"></span> min</span>
                <a th:href="@{/view/transfer}" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold text-sm hover:bg-indigo-600 hover:text-white transition">Vaqt berish</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
