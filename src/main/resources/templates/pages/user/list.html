<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Professional Foydalanuvchilar Boshqaruvi</title>
    <style>
        .skill-badge { font-size: 0.75rem; padding: 0.4em 0.8em; border-radius: 6px; }
        .user-card { transition: transform 0.2s; }
        .user-card:hover { transform: translateY(-5px); }
        .table thead th { background-color: #f8f9fa; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; color: #6c757d; border-top: none; }
        .avatar-circle { width: 40px; height: 40px; background-color: #e9ecef; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #495057; }
    </style>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">Foydalanuvchilar Boshqaruvi</h2>
            <p class="text-muted small">Tizimdagi barcha talaba va ustozlar ro'yxati</p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/view/transfer}" class="btn btn-warning shadow-sm fw-bold px-3">
                <i class="bi bi-arrow-left-right me-1"></i> Vaqt O'tkazish
            </a>
            <a th:href="@{/view/users/add}" class="btn btn-primary shadow-sm fw-bold px-3">
                <i class="bi bi-person-plus-fill me-1"></i> Yangi Qo'shish
            </a>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4 rounded-4">
        <div class="card-body p-3">
            <form th:action="@{/view/users}" method="get" class="row g-2">
                <div class="col-md-10">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" name="keyword" th:value="${keyword}"
                               class="form-control border-start-0 ps-0 shadow-none"
                               placeholder="Ism yoki bilim nomi orqali qidiring...">
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold">Qididirish</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4">№</th>
                    <th>Foydalanuvchi</th>
                    <th>Aloqa</th>
                    <th>Balans</th>
                    <th class="text-end pe-4">Amallar</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u, iter : ${users}">
                    <td class="ps-4 fw-medium text-muted" th:text="${(currentPage * 5) + iter.count}"></td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="avatar-circle me-3" th:text="${#strings.substring(u.fullName, 0, 1)}">U</div>
                            <div>
                                <div class="fw-bold text-dark" th:text="${u.fullName}">Ism Familiya</div>
                                <div class="d-flex flex-wrap gap-1 mt-1">
                                    <span th:each="s : ${u.skills}"
                                          class="badge skill-badge border"
                                          th:classappend="${s.skillType.name() == 'TEACH'} ? 'bg-success-subtle text-success' : 'bg-primary-subtle text-primary'">
                                        <i th:class="${s.skillType.name() == 'TEACH'} ? 'bi bi-mortarboard' : 'bi bi-book'"></i>
                                        <span th:text="${s.skillName}"></span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td class="text-muted" th:text="${u.phoneNumber}"></td>
                    <td>
                        <span class="badge rounded-pill px-3 py-2"
                              th:classappend="${u.timeBalans <= 0} ? 'bg-danger-subtle text-danger' : 'bg-success-subtle text-success'">
                            <i class="bi bi-clock me-1"></i>[[${u.timeBalans}]] min
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="btn-group">
                            <a th:href="@{/view/skill/add/{id}(id=${u.id})}" class="btn btn-light btn-sm border" title="Bilim qo'shish">
                                <i class="bi bi-plus-lg text-primary"></i>
                            </a>
                            <a th:href="@{/view/users/delete/{id}(id=${u.id})}" class="btn btn-light btn-sm border"
                               onclick="return confirm('O\'chirmoqchimisiz?')" title="O'chirish">
                                <i class="bi bi-trash text-danger"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="card-footer bg-white border-0 py-4" th:if="${totalPages > 1}">
            <nav>
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/view/users(page=${currentPage - 1}, keyword=${keyword})}"><i class="bi bi-arrow-left"></i></a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                        <a class="page-link" th:href="@{/view/users(page=${i}, keyword=${keyword})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/view/users(page=${currentPage + 1}, keyword=${keyword})}"><i class="bi bi-arrow-right"></i></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
