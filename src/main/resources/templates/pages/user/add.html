<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Yangi Foydalanuvchi | Admin Panel</title>
</head>
<body>
<div layout:fragment="content" class="max-w-2xl mx-auto">
    <a th:href="@{/view/users}" class="inline-flex items-center text-slate-500 hover:text-indigo-600 font-bold mb-6 transition-colors group">
        <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i>
        Ro'yxatga qaytish
    </a>

    <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden">
        <div class="bg-indigo-600 p-8 text-white relative overflow-hidden">
            <div class="relative z-10 flex items-center space-x-5">
                <div class="bg-white/20 p-4 rounded-2xl backdrop-blur-md">
                    <i class="fas fa-user-plus text-3xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black uppercase tracking-tight">Ro'yxatdan o'tkazish</h2>
                    <p class="text-indigo-100 text-sm italic opacity-80">Yangi foydalanuvchi uchun tizimga kirish huquqini yarating</p>
                </div>
            </div>
            <i class="fas fa-shield-halved absolute -right-4 -bottom-4 text-white/10 text-9xl"></i>
        </div>

        <form th:action="@{/view/users/save}" th:object="${userDto}" method="post" class="p-10 space-y-8">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">To'liq ism (F.I.SH)</label>
                    <div class="relative">
                        <input type="text" th:field="*{fullName}"
                               th:classappend="${#fields.hasErrors('fullName')} ? 'border-rose-300 bg-rose-50' : 'border-slate-100 bg-slate-50'"
                               class="w-full p-4 pl-12 rounded-2xl border-2 focus:border-indigo-500 focus:bg-white outline-none transition-all font-semibold shadow-inner"
                               placeholder="Masalan: Bekzod Jumabaev">
                        <i class="fas fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    </div>
                    <p class="text-rose-500 text-xs font-bold mt-1 ml-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Telefon raqami</label>
                    <div class="relative">
                        <input type="text" th:field="*{phoneNumber}"
                               th:classappend="${#fields.hasErrors('phoneNumber')} ? 'border-rose-300 bg-rose-50' : 'border-slate-100 bg-slate-50'"
                               class="w-full p-4 pl-12 rounded-2xl border-2 focus:border-indigo-500 focus:bg-white outline-none transition-all font-semibold shadow-inner"
                               placeholder="+998901234567">
                        <i class="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    </div>
                    <p class="text-rose-500 text-xs font-bold mt-1 ml-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Parol</label>
                    <div class="relative">
                        <input type="password" name="password"
                               th:classappend="${#fields.hasErrors('password')} ? 'border-rose-300 bg-rose-50' : 'border-slate-100 bg-slate-50'"
                               class="w-full p-4 pl-12 rounded-2xl border-2 focus:border-indigo-500 focus:bg-white outline-none transition-all font-semibold shadow-inner"
                               placeholder="Kamida 6 ta belgi">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    </div>
                    <p class="text-rose-500 text-xs font-bold mt-1 ml-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-100 transition transform active:scale-95 uppercase tracking-widest">
                    Saqlash
                </button>
                <button type="reset" class="px-8 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition">
                    <i class="fas fa-undo"></i>
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
