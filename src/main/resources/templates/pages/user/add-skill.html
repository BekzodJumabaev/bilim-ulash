<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Bilim Qo'shish - Bilim Ulash</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <a th:href="@{/view/users}" class="btn btn-link mb-3 p-0 text-decoration-none text-muted">
                <i class="bi bi-arrow-left"></i> Foydalanuvchilar ro'yxatiga qaytish
            </a>

            <div class="card shadow-lg border-0">
                <div class="card-header bg-dark text-white py-3 text-center">
                    <h4 class="mb-0 fw-bold">Bilim Biriktirish</h4>
                    <p class="small text-warning mb-0" th:text="${user.fullName}"></p>
                </div>

                <div class="card-body p-4 bg-white">
                    <form th:action="@{/view/skill/save/{id}(id=${user.id})}"
                          th:object="${skillRequest}" method="post">

                        <div class="mb-4">
                            <label class="form-label fw-bold"><i class="bi bi-book me-1"></i> Bilim nomi:</label>
                            <select th:field="*{id}" class="form-select form-select-lg border-2 shadow-sm" required>
                                <option value="">-- Fan yoki Bilimni tanlang --</option>
                                <option th:each="s : ${skillList}"
                                        th:value="${s.id}"
                                        th:text="${s.skillName}">Java</option>
                            </select>
                            <div class="form-text small text-muted text-end">Mavjud bilimlar ro'yxatidan tanlang.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold d-block mb-3">
                                <i class="bi bi-question-circle me-1"></i> Ushbu bilimidan foydalanish maqsadi:
                            </label>

                            <div class="row g-3">
                                <div class="col-6">
                                    <input type="radio" class="btn-check" th:field="*{skillType}"
                                           value="TEACH" id="typeTeach" required>
                                    <label class="btn btn-outline-success w-100 py-3 fw-bold shadow-sm" for="typeTeach">
                                        <i class="bi bi-mortarboard fs-4 d-block mb-1"></i> O'rgataman
                                    </label>
                                </div>
                                <div class="col-6">
                                    <input type="radio" class="btn-check" th:field="*{skillType}"
                                           value="LEARN" id="typeLearn" required>
                                    <label class="btn btn-outline-primary w-100 py-3 fw-bold shadow-sm" for="typeLearn">
                                        <i class="bi bi-pencil-square fs-4 d-block mb-1"></i> O'rganaman
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-dark btn-lg fw-bold shadow">
                                <i class="bi bi-check-circle me-1"></i> Bilimni Saqlash
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="alert alert-light border mt-4 small text-muted">
                <i class="bi bi-info-circle me-1 text-info"></i>
                Agar foydalanuvchi bilimni <strong>TEACH</strong> (O'rgatish) sifatida qo'shsa, u tizimda "Ustoz" sifatida ko'rinadi.
            </div>
        </div>
    </div>
</div>
</body>
</html>
