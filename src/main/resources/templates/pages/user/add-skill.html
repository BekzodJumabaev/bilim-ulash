<!DOCTYPE html>
<html layout:decorate="~{layout/main}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content" class="max-w-2xl mx-auto bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-gray-100">
    <div class="bg-emerald-600 p-8 text-white flex items-center space-x-4">
        <i class="fas fa-brain text-4xl"></i>
        <div><h2 class="text-2xl font-black uppercase">Yangi Bilim</h2><p class="text-emerald-100 text-sm italic" th:text="${user.fullName + ' uchun'}"></p></div>
    </div>
    <form th:action="@{/view/skill/save}" th:object="${skillRequest}" method="post" class="p-10 grid grid-cols-2 gap-8">
        <div class="col-span-2">
            <label class="block text-xs font-black text-gray-400 uppercase mb-2">Yo'nalish:</label>
            <select th:field="*{skillId}" class="w-full p-4 bg-gray-50 border rounded-2xl" required>
                <option value="">Tanlang...</option>
                <option th:each="s : ${skillList}" th:value="${s.id}" th:text="${s.skillName}"></option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-black text-gray-400 uppercase mb-2">Tajriba (yil):</label>
            <input type="number" th:field="*{experienceYear}" class="w-full p-4 bg-gray-50 border rounded-2xl" min="0" required>
        </div>
        <div>
            <label class="block text-xs font-black text-gray-400 uppercase mb-2">Daraja:</label>
            <select th:field="*{skillType}" class="w-full p-4 bg-gray-50 border rounded-2xl">
                <option th:each="type : ${T(com.example.model.SkillType).values()}" th:value="${type}" th:text="${type}"></option>
            </select>
        </div>
        <button type="submit" class="col-span-2 bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-2xl shadow-xl transition active:scale-95">SAQLASH</button>
    </form>
</div>
</body>
</html>
