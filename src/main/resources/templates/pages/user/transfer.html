<!DOCTYPE html>
<html layout:decorate="~{layout/main}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content" class="max-w-xl mx-auto">
    <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-indigo-600 p-8 text-white text-center">
            <i class="fas fa-paper-plane text-4xl mb-4"></i>
            <h2 class="text-3xl font-black">VAQT O'TKAZISH</h2>
        </div>
        <form th:action="@{/view/transfer}" th:object="${transactionDto}" method="post" class="p-10 space-y-6">
            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Kimga (Ustoz):</label>
                <select th:field="*{teacherId}" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                    <option value="">Tanlang...</option>
                    <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.fullName}"></option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Miqdor (daqiqada):</label>
                <input type="number" th:field="*{amount}" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="60" min="1" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl shadow-xl transition active:scale-95">YUBORISH</button>
        </form>
    </div>
</div>
</body>
</html>
