<!DOCTYPE html>
<html layout:decorate="~{layout/main}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Vaqt O'tkazish | Bilim Ulash</title></head>
<body>
<div layout:fragment="content" class="max-w-xl mx-auto">
    <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-50">
        <div class="bg-indigo-600 p-10 text-white text-center relative">
            <div class="bg-white/20 w-20 h-20 rounded-3xl backdrop-blur-md flex items-center justify-center mx-auto mb-6 shadow-xl border border-white/30 rotate-3">
                <i class="fas fa-paper-plane text-3xl"></i>
            </div>
            <h2 class="text-3xl font-black tracking-tighter italic uppercase">Vaqt Ulashish</h2>
            <p class="text-indigo-100 text-sm font-medium mt-2 opacity-80 uppercase tracking-widest">Mahorat egalarini rag'batlantiring</p>

            <i class="fas fa-share-nodes absolute right-6 top-6 text-white/10 text-6xl"></i>
        </div>

        <form th:action="@{/view/transfer}" th:object="${transactionDto}" method="post" class="p-12 space-y-8">
            <div class="space-y-3">
                <label class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Qabul qiluvchi (Ustoz):</label>
                <div class="relative group">
                    <select th:field="*{teacherId}"
                            class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] focus:border-indigo-500 focus:bg-white outline-none transition-all appearance-none font-bold text-slate-700 shadow-inner" required>
                        <option value="">Ro'yxatdan tanlang...</option>
                        <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.fullName}"></option>
                    </select>
                    <i class="fas fa-user-tie absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 hidden"></i>
                    <i class="fas fa-chevron-down absolute right-6 top-1/2 -translate-y-1/2 text-indigo-600 pointer-events-none"></i>
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Vaqt miqdori (daqiqada):</label>
                <div class="relative">
                    <input type="number" th:field="*{amount}"
                           class="w-full p-5 pl-14 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] focus:border-indigo-500 focus:bg-white outline-none transition-all font-black text-xl text-indigo-600 shadow-inner"
                           placeholder="Masalan: 60" min="1" required>
                    <div class="absolute left-5 top-1/2 -translate-y-1/2 w-6 h-6 bg-indigo-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-clock text-indigo-600 text-xs"></i>
                    </div>
                </div>
                <p class="text-[10px] text-slate-400 font-bold italic ml-2">* Sizning balansingizdan chegirib tashlanadi</p>
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-slate-800 text-white font-black py-6 rounded-[1.5rem] shadow-xl shadow-indigo-100 transition-all transform active:scale-95 uppercase tracking-[0.2em] text-sm mt-4">
                Tasdiqlash va Yuborish
            </button>
        </form>

        <div class="bg-slate-50 p-6 text-center border-t border-slate-100">
            <a th:href="@{/view/transfer/transactions}" class="text-indigo-600 font-black text-[10px] uppercase tracking-widest hover:underline decoration-2 underline-offset-4 transition">
                <i class="fas fa-clock-rotate-left mr-2"></i> O'tkazmalar tarixi
            </a>
        </div>
    </div>
</div>
</body>
</html>
