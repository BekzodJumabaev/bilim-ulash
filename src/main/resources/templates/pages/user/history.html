<!DOCTYPE html>
<html layout:decorate="~{layout/main}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content" class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-gray-100">
    <div class="p-8 bg-slate-50 border-b">
        <h2 class="text-2xl font-black text-slate-800 italic uppercase"><i class="fas fa-history mr-2 text-indigo-600"></i> O'tkazmalar tarixi</h2>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead class="bg-slate-100 text-slate-500 text-xs font-black uppercase tracking-widest">
            <tr>
                <th class="p-6">Kimdan</th>
                <th class="p-6">Kimga</th>
                <th class="p-6 text-center">Miqdor</th>
                <th class="p-6">Sana</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="t : ${transactions}" class="hover:bg-slate-50 transition">
                <td class="p-6 font-bold text-slate-700" th:text="${t.studentName}"></td>
                <td class="p-6 text-slate-600" th:text="${t.teacherName}"></td>
                <td class="p-6 text-center"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-black text-xs" th:text="${t.amount + ' min'}"></span></td>
                <td class="p-6 text-slate-400 text-sm" th:text="${#temporals.format(t.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:if="${#lists.isEmpty(transactions)}" class="p-20 text-center text-slate-300 font-bold uppercase tracking-tighter">Hozircha hech narsa yo'q</div>
</div>
</body>
</html>
