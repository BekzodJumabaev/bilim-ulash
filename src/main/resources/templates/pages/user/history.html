<!DOCTYPE html>
<html layout:decorate="~{layout/main}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>O'tkazmalar Tarixi | Bilim Ulash</title></head>
<body>
<div layout:fragment="content" class="space-y-6">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 flex items-center justify-between">
        <div class="flex items-center space-x-5">
            <div class="bg-indigo-100 p-4 rounded-2xl text-indigo-600 shadow-sm">
                <i class="fas fa-history text-2xl"></i>
            </div>
            <div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight uppercase">O'tkazmalar tarixi</h2>
                <p class="text-slate-400 text-sm font-semibold italic">Barcha vaqt almashinuvlari va tranzaksiyalar xronologiyasi</p>
            </div>
        </div>
        <div class="hidden sm:block">
            <span class="px-5 py-2 bg-slate-100 text-slate-500 rounded-2xl text-xs font-black uppercase tracking-widest border border-slate-200">
                Jami: <span th:text="${#lists.size(transactions)}">0</span> ta
            </span>
        </div>
    </div>

    <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-50 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] border-b border-slate-100">
                    <th class="p-8">Yuboruvchi (Student)</th>
                    <th class="p-8 text-center"><i class="fas fa-arrow-right"></i></th>
                    <th class="p-8">Qabul qiluvchi (Ustoz)</th>
                    <th class="p-8 text-center text-indigo-600">Miqdor</th>
                    <th class="p-8">Amal vaqti</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                <tr th:each="t : ${transactions}" class="hover:bg-slate-50/50 transition-colors group">
                    <td class="p-8">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center font-black text-xs" th:text="${#strings.substring(t.studentName,0,1)}"></div>
                            <span class="font-bold text-slate-700" th:text="${t.studentName}">Student</span>
                        </div>
                    </td>
                    <td class="p-8 text-center text-slate-300">
                        <i class="fas fa-long-arrow-alt-right text-lg"></i>
                    </td>
                    <td class="p-8 text-slate-600 font-semibold" th:text="${t.teacherName}">Ustoz</td>
                    <td class="p-8 text-center">
                        <span class="bg-blue-50 text-blue-700 px-4 py-2 rounded-xl font-black text-xs border border-blue-100 inline-block min-w-[80px] shadow-sm" th:text="${t.amount + ' min'}">0 min</span>
                    </td>
                    <td class="p-8">
                        <div class="flex flex-col">
                            <span class="text-slate-800 font-bold text-sm" th:text="${#temporals.format(t.createdAt, 'dd.MM.yyyy')}">01.01.2026</span>
                            <span class="text-slate-400 text-[10px] font-black" th:text="${#temporals.format(t.createdAt, 'HH:mm')}">12:00</span>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(transactions)}" class="p-24 text-center">
            <div class="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-folder-open text-slate-200 text-3xl"></i>
            </div>
            <p class="text-slate-300 font-black uppercase tracking-widest text-xs">Hozircha hech qanday o'tkazma mavjud emas</p>
        </div>
    </div>
</div>
</body>
</html>
