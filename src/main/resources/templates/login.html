<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Kirish | Bilim Ulash</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
<div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">
    <h2 class="text-3xl font-black text-center text-gray-800 mb-8 uppercase tracking-tighter">Tizimga kirish</h2>
    <div th:if="${param.error}" class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center">Telefon raqam yoki parol xato!</div>
    <form th:action="@{/login}" method="post" class="space-y-6">
        <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Telefon raqam</label>
            <input type="text" name="username" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="+998901234567" required>
        </div>
        <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Parol</label>
            <input type="password" name="password" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="******" required>
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl transition transform active:scale-95">KIRISH</button>
    </form>
    <p class="mt-8 text-center text-gray-500">Akkountingiz yo'qmi? <a th:href="@{/auth/register}" class="text-indigo-600 font-bold hover:underline">Ro'yxatdan o'tish</a></p>
</div>
</body>
</html>
