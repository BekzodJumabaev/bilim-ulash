<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | Bilim Ulash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#EEF2FF] min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

<div class="absolute -top-24 -left-24 w-96 h-96 bg-indigo-300 rounded-full blur-[100px] opacity-30"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-purple-300 rounded-full blur-[100px] opacity-30"></div>

<div class="bg-white/80 backdrop-blur-xl w-full max-w-md rounded-[3rem] shadow-2xl p-12 border border-white relative z-10">
    <div class="text-center mb-12">
        <div class="bg-indigo-600 w-16 h-16 rounded-[1.5rem] flex items-center justify-center mx-auto mb-4 shadow-xl shadow-indigo-200 rotate-12">
            <i class="fas fa-graduation-cap text-white text-2xl"></i>
        </div>
        <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">BILIM <span class="text-indigo-600">ULASH</span></h1>
        <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em] mt-2">Xush kelibsiz!</p>
    </div>

    <div th:if="${param.error}" class="mb-8 p-4 bg-rose-50 border-2 border-rose-100 text-rose-600 rounded-2xl text-xs font-black text-center animate-pulse uppercase tracking-tight">
        <i class="fas fa-exclamation-circle mr-2"></i> Raqam yoki parol xato!
    </div>

    <form th:action="@{/login}" method="post" class="space-y-8">
        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Telefon raqam</label>
            <div class="relative">
                <input type="text" name="username" class="w-full p-5 pl-14 bg-white border-2 border-slate-100 rounded-[1.5rem] focus:border-indigo-500 outline-none transition-all font-bold text-slate-700 shadow-sm" placeholder="+998" required>
                <i class="fas fa-phone absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
            </div>
        </div>

        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Parol</label>
            <div class="relative">
                <input type="password" name="password" class="w-full p-5 pl-14 bg-white border-2 border-slate-100 rounded-[1.5rem] focus:border-indigo-500 outline-none transition-all font-bold text-slate-700 shadow-sm" placeholder="******" required>
                <i class="fas fa-lock absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
            </div>
        </div>

        <button type="submit" class="w-full bg-indigo-600 hover:bg-slate-800 text-white font-black py-6 rounded-[1.5rem] shadow-2xl shadow-indigo-200 transition transform active:scale-95 uppercase tracking-widest text-xs">
            Tizimga kirish
        </button>
    </form>

    <div class="mt-12 text-center">
        <p class="text-slate-400 font-bold text-xs">Hali a'zo emasmisiz?</p>
        <a th:href="@{/auth/register}" class="inline-block mt-2 text-indigo-600 font-black text-xs uppercase tracking-widest border-b-2 border-indigo-100 hover:border-indigo-600 transition pb-1">
            Ro'yxatdan o'tish
        </a>
    </div>
</div>
</body>
</html>
