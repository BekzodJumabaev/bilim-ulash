<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilim Ulash | Kirish va Ro'yxatdan o'tish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .bg-animate {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0d9488, #0891b2);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hidden-form { display: none; }
        .error-text { color: #ef4444; font-size: 0.75rem; margin-top: 0.25rem; }
    </style>
</head>
<body class="bg-animate min-h-screen flex items-center justify-center p-4">

<div class="glass-card w-full max-w-md rounded-3xl shadow-2xl p-8 transition-all duration-500 overflow-hidden">

    <div class="text-center mb-6">
        <div class="inline-block p-3 bg-cyan-600 rounded-2xl shadow-lg mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
        </div>
        <h1 id="formTitle" class="text-3xl font-bold text-gray-800">Xush Kelibsiz</h1>
        <p id="formSubtitle" class="text-gray-500 mt-2">Vaqtingizni bilimga almashtiring</p>
    </div>

    <div th:if="${param.error}" class="mb-4 p-3 bg-red-100 text-red-700 rounded-xl text-sm text-center">
        Telefon raqam yoki parol xato!
    </div>

    <div th:if="${param.success}" class="mb-4 p-3 bg-green-100 text-green-700 rounded-xl text-sm text-center">
        Muvaffaqiyatli ro'yxatdan o'tdingiz! Kirishishingiz mumkin.
    </div>

    <form id="loginForm" th:action="@{/login}" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Telefon raqam</label>
            <input type="text" name="username" placeholder="+998901234567" required
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-cyan-500 focus:outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Parol</label>
            <input type="password" name="password" placeholder="••••••••" required
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-cyan-500 focus:outline-none transition-all">
        </div>
        <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-cyan-200 transition-all transform active:scale-95">
            Tizimga Kirish
        </button>
    </form>

    <form id="registerForm" th:action="@{/register}" th:object="${userCreateDto}" method="POST" class="space-y-3 hidden-form">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">To'liq ism (Full Name)</label>
            <input type="text" th:field="*{fullName}" placeholder="Ali Valiyev"
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all">
            <p class="error-text" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Telefon raqam</label>
            <input type="text" th:field="*{phoneNumber}" placeholder="+998901234567"
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all">
            <p class="error-text" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Parol (min 6 belgi)</label>
            <input type="password" th:field="*{password}" placeholder="••••••••"
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all">
            <p class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-200 transition-all transform active:scale-95">
            Ro'yxatdan O'tish
        </button>
    </form>

    <div class="mt-6 text-center">
        <button id="toggleBtn" onclick="toggleForms()" class="text-sm font-semibold text-cyan-600 hover:text-cyan-800 transition-colors">
            Hali hisobingiz yo'qmi? Ro'yxatdan o'ting
        </button>
    </div>
</div>

<script th:inline="javascript">
    /* Thymeleaf orqali backend'dan xatolik kelganini aniqlash */
    const hasErrors = [[${#fields.hasErrors('userCreateDto.*')}]];

    let isLogin = !hasErrors; // Agar xato bo'lsa, registratsiya formasini ko'rsatadi

    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const formTitle = document.getElementById('formTitle');
    const formSubtitle = document.getElementById('formSubtitle');
    const toggleBtn = document.getElementById('toggleBtn');

    function updateUI() {
        if (isLogin) {
            loginForm.classList.remove('hidden-form');
            registerForm.classList.add('hidden-form');
            formTitle.innerText = "Xush Kelibsiz";
            formSubtitle.innerText = "Vaqtingizni bilimga almashtiring";
            toggleBtn.innerText = "Hali hisobingiz yo'qmi? Ro'yxatdan o'ting";
        } else {
            loginForm.classList.add('hidden-form');
            registerForm.classList.remove('hidden-form');
            formTitle.innerText = "Yangi Hisob";
            formSubtitle.innerText = "Bilim ulashishni boshlang";
            toggleBtn.innerText = "Profilingiz bormi? Kirish";
        }
    }

    function toggleForms() {
        isLogin = !isLogin;
        updateUI();
    }

    // Sahifa yuklanganda holatni tekshirish (Xatolik bo'lsa Register ochiq turadi)
    window.onload = updateUI;
</script>
</body>
</html>
