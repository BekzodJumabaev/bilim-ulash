<!DOCTYPE html>
<html layout:decorate="~{layout/main}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content" class="space-y-8">

    <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
        <form th:action="@{/view/users}" method="get" class="flex items-center bg-slate-50 rounded-[1.5rem] p-2 border-2 border-slate-100 focus-within:border-indigo-500 transition-all">
            <i class="fas fa-search ml-6 text-slate-400"></i>
            <input type="text" name="keyword" placeholder="Sizga qanday bilim kerak? (Masalan: Java, Ingliz tili...)"
                   class="bg-transparent w-full p-4 outline-none font-bold text-slate-700">
            <button type="submit" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-slate-800 transition shadow-lg shadow-indigo-100">
                Qidirish
            </button>
        </form>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 flex items-center justify-between">
            <div class="flex items-center space-x-6">
                <div class="w-24 h-24 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-[2rem] flex items-center justify-center text-white text-3xl font-black shadow-2xl">
                    <span th:text="${#strings.substring(user.fullName,0,1)}">U</span>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-slate-800 tracking-tighter" th:text="${user.fullName}">Ism</h1>
                    <p class="text-slate-400 font-semibold mt-1" th:text="${user.phoneNumber}">+998</p>
                    <div class="mt-4 flex gap-4 items-center">
                        <a th:href="@{/view/users/edit/{id}(id=${user.id})}" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-600 hover:text-white transition">
                            <i class="fas fa-edit mr-1"></i> Ismni tahrirlash
                        </a>
                        <span class="px-4 py-2 bg-emerald-50 text-emerald-600 rounded-xl text-[10px] font-black uppercase tracking-widest border border-emerald-100">Faol</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-indigo-600 p-8 rounded-[2.5rem] shadow-2xl shadow-indigo-200 relative overflow-hidden group">
            <div class="relative z-10">
                <span class="text-indigo-100 text-[10px] font-black uppercase tracking-widest opacity-80">Sizning Balansingiz</span>
                <div class="mt-2 flex items-baseline gap-2">
                    <span class="text-6xl font-black text-white tracking-tighter" th:text="${user.timeBalans}">0</span>
                    <span class="text-indigo-200 font-bold uppercase text-xs">Minut</span>
                </div>
            </div>
            <i class="fas fa-clock absolute -right-6 -bottom-6 text-white opacity-10 text-[10rem] group-hover:scale-110 transition-transform duration-700"></i>
        </div>
    </div>
</div>
</body>
</html>
