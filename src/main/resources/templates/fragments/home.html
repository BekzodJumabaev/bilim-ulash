<!DOCTYPE html>
<html layout:decorate="~{layout/main}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content" class="space-y-8">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 flex items-center justify-between">
            <div class="flex items-center space-x-6">
                <div class="w-24 h-24 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-[2rem] flex items-center justify-center text-white text-3xl font-black shadow-2xl shadow-indigo-200">
                    <span th:text="${#strings.substring(user.fullName,0,1)}">U</span>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-slate-800 tracking-tighter" th:text="${user.fullName}">Foydalanuvchi Ismi</h1>
                    <p class="text-slate-400 font-semibold mt-1" th:text="${user.phoneNumber}">+998901234567</p>
                    <div class="mt-4 flex gap-2">
                        <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-bold uppercase tracking-widest border border-indigo-100">O'quvchi</span>
                        <span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-xs font-bold uppercase tracking-widest border border-emerald-100">Faol</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-indigo-600 p-8 rounded-[2.5rem] shadow-2xl shadow-indigo-200 relative overflow-hidden group">
            <div class="relative z-10">
                <span class="text-indigo-100 text-sm font-bold uppercase tracking-widest opacity-80">Joriy Balans</span>
                <div class="mt-2 flex items-baseline gap-2">
                    <span class="text-5xl font-black text-white tracking-tighter" th:text="${user.timeBalans}">0</span>
                    <span class="text-indigo-200 font-bold uppercase text-sm">Minut</span>
                </div>
                <div class="mt-6 border-t border-indigo-500/50 pt-4">
                    <p class="text-indigo-100 text-xs font-medium">Bu balans orqali siz yangi bilimlar olishingiz mumkin.</p>
                </div>
            </div>
            <i class="fas fa-clock absolute -right-4 -bottom-4 text-white opacity-10 text-9xl group-hover:scale-110 transition-transform duration-700"></i>
        </div>
    </div>

    <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-black text-slate-800 tracking-tighter flex items-center gap-3">
                <i class="fas fa-brain text-indigo-600"></i> Mening Mahoratlarim
            </h2>
            <a th:href="@{/view/skill/add}" class="text-indigo-600 font-bold text-sm hover:underline tracking-tight">+ Yangi qo'shish</a>
        </div>

        <div class="flex flex-wrap gap-4">
            <div th:each="skill : ${user.skills}" class="group relative px-6 py-4 bg-slate-50 border border-slate-100 rounded-3xl hover:bg-white hover:shadow-xl hover:border-indigo-100 transition-all duration-300">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-indigo-600 shadow-sm">
                        <i class="fas fa-star text-xs"></i>
                    </div>
                    <div>
                        <span class="block text-slate-800 font-black tracking-tight" th:text="${skill.skillName}">Java Spring</span>
                        <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest" th:text="${skill.skillType}">O'rgatish</span>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(user.skills)}" class="w-full py-16 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-[2.5rem]">
                <div class="bg-slate-50 p-6 rounded-full mb-4">
                    <i class="fas fa-folder-open text-slate-300 text-4xl"></i>
                </div>
                <p class="text-slate-400 font-semibold italic tracking-tight">Hozircha hech qanday mahorat qo'shilmagan</p>
                <a th:href="@{/view/skill/add}" class="mt-4 bg-slate-800 text-white px-6 py-2.5 rounded-2xl text-sm font-bold shadow-lg hover:bg-indigo-600 transition">Ilk mahoratni qo'shing</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
