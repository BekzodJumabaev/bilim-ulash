<!DOCTYPE html>
<html layout:decorate="~{layout/main}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Bosh sahifa</title></head>
<body>
<div layout:fragment="content" class="space-y-10">
    <div class="relative py-12 px-8 bg-indigo-900 rounded-[3rem] overflow-hidden shadow-2xl">
        <div class="relative z-10 max-w-2xl">
            <h1 class="text-4xl font-black text-white tracking-tight mb-4 uppercase italic">Qanday bilim <span class="text-indigo-400 underline decoration-indigo-500 underline-offset-8">o'rganmoqchisiz?</span></h1>
            <form th:action="@{/view/users}" method="get" class="flex items-center bg-white rounded-2xl p-2 shadow-2xl focus-within:ring-4 ring-indigo-500/30 transition-all">
                <i class="fas fa-search ml-5 text-slate-400 text-xl"></i>
                <input type="text" name="keyword" placeholder="Masalan: Spring Boot, Ingliz tili, UI/UX..."
                       class="bg-transparent w-full p-4 outline-none font-bold text-slate-700 placeholder:text-slate-300">
                <button type="submit" class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-black uppercase text-[11px] tracking-widest hover:bg-slate-800 transition shadow-lg">
                    Qidirish
                </button>
            </form>
        </div>
        <div class="absolute top-0 right-0 w-1/2 h-full opacity-10">
            <i class="fas fa-brain text-[15rem] absolute -top-10 -right-10 rotate-12"></i>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden group">
            <div class="relative">
                <div class="w-32 h-32 bg-gradient-to-tr from-indigo-600 to-violet-600 rounded-[2.5rem] flex items-center justify-center text-white text-5xl font-black shadow-2xl group-hover:scale-105 transition-transform duration-500">
                    <span th:text="${#strings.substring(user.fullName,0,1)}">U</span>
                </div>
                <div class="absolute -bottom-2 -right-2 bg-emerald-500 w-8 h-8 rounded-full border-4 border-white"></div>
            </div>

            <div class="flex-1 space-y-4 text-center md:text-left">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight" th:text="${user.fullName}">F.I.SH</h2>
                    <p class="text-slate-400 font-bold flex items-center justify-center md:justify-start gap-2 mt-1">
                        <i class="fas fa-phone-alt text-indigo-500"></i> <span th:text="${user.phoneNumber}">+998</span>
                    </p>
                </div>
                <div class="flex flex-wrap gap-3 justify-center md:justify-start">
                    <a th:href="@{/view/users/edit/{id}(id=${user.id})}" class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-600 hover:text-white transition">
                        <i class="fas fa-user-edit mr-2"></i> Profilni tahrirlash
                    </a>
                </div>
            </div>
            <i class="fas fa-id-badge absolute -right-4 -bottom-4 text-slate-50 text-9xl group-hover:text-indigo-50 transition-colors"></i>
        </div>

        <div class="bg-indigo-600 p-10 rounded-[3rem] shadow-2xl shadow-indigo-100 relative overflow-hidden group">
            <div class="relative z-10 flex flex-col h-full justify-between">
                <div>
                    <span class="bg-white/10 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">Time Balance</span>
                    <div class="mt-6 flex items-baseline gap-3">
                        <span class="text-7xl font-black text-white tracking-tighter" th:text="${user.timeBalans}">60</span>
                        <span class="text-indigo-200 font-bold uppercase text-sm tracking-widest">minut</span>
                    </div>
                </div>
                <a th:href="@{/view/transfer/transactions}" class="mt-8 flex items-center justify-center gap-2 bg-white text-indigo-600 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-indigo-50 transition shadow-xl">
                    <i class="fas fa-history"></i> Tarixni ko'rish
                </a>
            </div>
            <i class="fas fa-clock absolute -right-6 -top-6 text-white opacity-10 text-[12rem] rotate-12 group-hover:scale-110 transition-transform duration-1000"></i>
        </div>
    </div>
</div>
</body>
</html>
