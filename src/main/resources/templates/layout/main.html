<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilim Ulash | Tizim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen font-sans">
<nav class="bg-indigo-600 text-white shadow-xl sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between h-16 items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white text-indigo-600 p-2 rounded-lg shadow-inner">
                    <i class="fas fa-seedling text-xl"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight italic">BILIM ULASH</span>
            </div>
            <div class="hidden md:flex space-x-8 items-center font-medium">
                <a th:href="@{/home}" class="hover:text-indigo-200 transition">Asosiy</a>
                <a th:href="@{/view/transfer}" class="hover:text-indigo-200 transition">O'tkazma</a>
                <a th:href="@{/view/skill/add}" class="hover:text-indigo-200 transition">Bilim qo'shish</a>
                <div class="bg-indigo-700 px-4 py-2 rounded-xl flex items-center border border-indigo-400">
                    <i class="fas fa-clock mr-2 text-yellow-300"></i>
                    <span sec:authentication="name" class="text-sm">User</span>
                </div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="bg-rose-500 hover:bg-rose-600 px-4 py-2 rounded-xl text-sm font-bold shadow-lg transition active:scale-95">Chiqish</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto py-10 px-4">
    <div th:if="${errorMessage}" class="mb-8 flex items-center p-5 bg-white border-l-8 border-rose-500 rounded-2xl shadow-xl animate-bounce">
        <i class="fas fa-circle-exclamation text-rose-500 text-2xl mr-4"></i>
        <span class="text-gray-800 font-bold" th:text="${errorMessage}">Xato xabari</span>
    </div>

    <div layout:fragment="content"></div>
</div>
</body>
</html>
