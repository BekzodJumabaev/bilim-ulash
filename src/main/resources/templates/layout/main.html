<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Bilim Ulash">Bilim Ulash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar-brand { font-weight: 800; letter-spacing: 1px; color: #ffc107 !important; }
        .card { border: none; border-radius: 15px; }
        .main-container { min-height: 80vh; padding-top: 20px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/view/users}">BILIM ULASH</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/users}"><i class="bi bi-people"></i> Foydalanuvchilar</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/transfer/transactions}"><i class="bi bi-clock-history"></i> Tarix</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/transfer}"><i class="bi bi-arrow-left-right"></i> O'tkazma</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container main-container">
    <div layout:fragment="content"></div>
</div>

<footer class="text-center mt-5 py-4 text-muted border-top bg-white">
    <p class="mb-0">&copy; 2026 Professional Bilim Ulash Platformasi</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
