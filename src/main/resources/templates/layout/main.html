<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Bilim Ulash | Bosh sahifa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        .dark-mode { background-color: #0f172a !important; color: #f8fafc !important; }
        .dark-mode .bg-white { background-color: #1e293b !important; border-color: #334155 !important; color: #f1f5f9 !important; }
        .dark-mode .text-slate-800, .dark-mode .text-slate-600 { color: #f1f5f9 !important; }
        .dark-mode .bg-slate-50 { background-color: #334155 !important; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .dark-mode .glass-effect { background: rgba(30, 41, 59, 0.9); }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen">
<nav class="sticky top-0 z-50 glass-effect border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">
            <a th:href="@{/home}" class="flex items-center space-x-3 group">
                <div class="bg-indigo-600 p-2.5 rounded-2xl shadow-lg">
                    <i class="fas fa-graduation-cap text-white text-xl"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter text-slate-800 uppercase italic">Bosh sahifa</span>
            </a>

            <div class="hidden md:flex space-x-8 items-center font-bold text-slate-600 uppercase text-[10px] tracking-widest">
                <a th:href="@{/view/users}" class="hover:text-indigo-600 transition flex items-center gap-2"><i class="fas fa-users"></i> Bilim Egalari</a>
                <a th:href="@{/view/transfer/transactions}" class="hover:text-indigo-600 transition flex items-center gap-2"><i class="fas fa-history"></i> O'tkazmalar tarixi</a>
                <a th:href="@{/view/skill/add}" class="hover:text-indigo-600 transition flex items-center gap-2"><i class="fas fa-plus-circle"></i> Bilim qo'shish</a>
                <a th:href="@{/view/users/profile/{id}(id=${user.id})}" class="hover:text-indigo-600 transition flex items-center gap-2"><i class="fas fa-user-circle"></i> Profil</a>
            </div>

            <div class="flex items-center space-x-6">
                <button onclick="toggleTheme()" class="text-slate-400 hover:text-indigo-600 transition text-lg"><i class="fas fa-moon" id="theme-icon"></i></button>

                <div class="hidden sm:flex flex-col items-end">
                    <span class="text-[10px] font-black text-slate-800 uppercase" th:text="${user.fullName}">F.I.SH</span>
                    <span class="text-[8px] font-bold text-indigo-500 uppercase tracking-widest">Onlayn</span>
                </div>

                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="flex items-center gap-2 bg-rose-50 hover:bg-rose-100 text-rose-600 px-4 py-2 rounded-xl transition font-black text-[10px] uppercase tracking-widest">
                        <span>Chiqish</span> <i class="fas fa-power-off"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
<div class="max-w-7xl mx-auto py-10 px-4">
    <div layout:fragment="content"></div>
</div>
<script>
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const icon = document.getElementById('theme-icon');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
    }
</script>
</body>
</html>
