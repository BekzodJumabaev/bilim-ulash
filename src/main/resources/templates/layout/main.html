<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | Bilim Ulash">Bilim Ulash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .dark { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen">

<nav class="sticky top-0 z-50 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-700">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between h-20 items-center">

            <div class="flex items-center space-x-10">
                <a th:href="@{/home}" class="flex items-center space-x-3 group">
                    <div class="bg-indigo-600 p-2.5 rounded-2xl shadow-lg">
                        <i class="fas fa-graduation-cap text-white text-xl"></i>
                    </div>
                    <span class="text-2xl font-black tracking-tighter uppercase italic flex">
                            <span class="text-slate-800 dark:text-white">BILIM</span>
                            <span class="text-indigo-600 ml-1">ULASH</span>
                        </span>
                </a>

                <div class="hidden lg:flex items-center space-x-6" sec:authorize="isAuthenticated()">
                    <a th:href="@{/view/users}" class="text-slate-500 dark:text-slate-400 hover:text-indigo-600 font-bold uppercase text-[10px] tracking-[0.2em] transition-all">
                        <i class="fas fa-users mr-1"></i> Bilim Egalari
                    </a>
                    <a th:href="@{/view/transfer/transactions}" class="text-slate-500 dark:text-slate-400 hover:text-indigo-600 font-bold uppercase text-[10px] tracking-[0.2em] transition-all">
                        <i class="fas fa-history mr-1"></i> Tarix
                    </a>
                    <a th:href="@{/view/skill/add}" class="flex items-center gap-2 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                        <i class="fas fa-plus-circle"></i> Bilim Qo'shish
                    </a>
                </div>
            </div>

            <div class="flex items-center space-x-5">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-500 hover:bg-indigo-100 transition-all">
                    <i class="fas fa-moon text-lg" id="theme-icon"></i>
                </button>

                <div class="flex items-center gap-4 border-l border-slate-200 dark:border-slate-700 pl-4" sec:authorize="isAuthenticated()">
                    <a th:href="@{/view/users/edit/{id}(id=${user.id})}" class="flex items-center gap-2 text-slate-600 dark:text-slate-300 font-bold uppercase text-[10px] tracking-widest hover:text-indigo-600 transition-all">
                        <div class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900/50 rounded-full flex items-center justify-center text-indigo-600">
                            <i class="fas fa-user text-xs"></i>
                        </div>
                        <span>Profil</span>
                    </a>

                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400 px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-rose-600 hover:text-white transition-all">
                            <i class="fas fa-power-off"></i> Chiqish
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto py-10 px-6">
    <div layout:fragment="content"></div>
</main>

<script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
    }

    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            icon.classList.replace('fa-sun', 'fa-moon');
        } else {
            html.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            icon.classList.replace('fa-moon', 'fa-sun');
        }
    }
</script>
</body>
</html>
