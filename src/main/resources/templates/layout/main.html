<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilim Ulash | Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen">

<nav class="sticky top-0 z-50 glass-effect border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">
            <div class="flex items-center space-x-3 group cursor-pointer">
                <div class="bg-indigo-600 p-2.5 rounded-2xl shadow-lg shadow-indigo-200 group-hover:scale-110 transition-transform">
                    <i class="fas fa-graduation-cap text-white text-xl"></i>
                </div>
                <span class="text-2xl font-extrabold tracking-tighter text-slate-800">BILIM <span class="text-indigo-600">ULASH</span></span>
            </div>

            <div class="hidden md:flex space-x-8 items-center font-semibold text-slate-600">
                <a th:href="@{/home}" class="hover:text-indigo-600 transition flex items-center gap-2">
                    <i class="fas fa-th-large text-sm"></i> Dashboard
                </a>
                <a th:href="@{/view/transfer}" class="hover:text-indigo-600 transition flex items-center gap-2 text-indigo-600 border-b-2 border-indigo-600 pb-1">
                    <i class="fas fa-exchange-alt text-sm"></i> O'tkazma
                </a>
                <a th:href="@{/view/skill/add}" class="hover:text-indigo-600 transition flex items-center gap-2">
                    <i class="fas fa-plus-circle text-sm"></i> Mahorat qo'shish
                </a>
            </div>

            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-3 bg-slate-100 px-4 py-2 rounded-2xl border border-slate-200">
                    <div class="w-8 h-8 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 font-bold">
                        <span sec:authentication="name" class="hidden"></span>
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <span sec:authentication="name" class="text-sm font-bold text-slate-700 uppercase tracking-tighter"></span>
                </div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="bg-rose-50 hover:bg-rose-100 text-rose-600 p-3 rounded-2xl transition group">
                        <i class="fas fa-power-off group-hover:rotate-90 transition-transform"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">

    <div th:if="${errorMessage}" class="mb-8 p-5 bg-rose-50 border-l-4 border-rose-500 rounded-2xl shadow-sm flex items-center animate-in fade-in slide-in-from-top duration-500">
        <div class="bg-rose-500 p-2 rounded-xl mr-4 shadow-lg shadow-rose-200">
            <i class="fas fa-circle-exclamation text-white"></i>
        </div>
        <span class="text-rose-800 font-bold tracking-tight" th:text="${errorMessage}">Xato xabari matni</span>
    </div>

    <div layout:fragment="content"></div>
</div>

</body>
</html>
